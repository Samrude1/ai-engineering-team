design_task:
  description: >
    Analyze the requirements and create a technical blueprint in Markdown.
    Define the class and method signatures needed for: {requirements}
    Main Module: {module_name}, Primary Class: {class_name}
  expected_output: >
    A clear Markdown blueprint.
  agent: engineering_lead

code_task:
  description: >
    Implement the logic in {module_name}.
    - Include all necessary imports at the top.
    - Focus on the {class_name} functionality.
    - LOGIC: Use a self.next_id counter for unique IDs; do NOT use list length.
    - Strictly logic only (no Gradio/UI).
  expected_output: >
    A functional Python file ({module_name}).
  agent: backend_engineer
  context:
    - design_task

frontend_task:
  description: >
    Create a Gradio UI in app.py.
    - Import {class_name} from {module_name}.
    - Use modern Gradio Blocks syntax (Gradio 5+).
    - API: Use 'interactive=False' instead of 'readonly=True'.
    - VISUALS: Implement a "Premium" look with custom CSS (gradients, shadows, professional fonts).
    - UX: Use engaging, high-level terminology for labels and buttons.
  expected_output: >
    A runnable app.py file.
  agent: frontend_engineer
  context:
    - code_task

test_task:
  description: >
    Write unit tests for {module_name}.
    - Test the primary methods of {class_name}.
    - Ensure basic edge cases are covered.
  expected_output: >
    A runnable test file.
  agent: test_engineer
  context:
    - code_task

documentation_task:
  description: >
    Generate a professional README.md for the project.
    Ensure it is Windows-friendly (use 'python', not 'python3').
  expected_output: >
    A professional README.md file.
  agent: documentation_engineer
  context:
    - code_task
    - frontend_task

requirements_task:
  description: >
    Create a requirements.txt file with only external dependencies.
  expected_output: >
    A clean requirements.txt file.
  agent: documentation_engineer
  context:
    - code_task
    - frontend_task