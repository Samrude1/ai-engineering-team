design_task:
  description: >
    Take the requirements and prepare an Engineering Blueprint.
    The goal is to design the BACKEND LOGIC and class structure.
    Requirements: {requirements}
  expected_output: >
    A professional Engineering Blueprint in Markdown format.
  agent: engineering_lead

code_task:
  description: >
    Write a python module that implements ONLY the backend business logic.
    Class: {class_name}, Module: {module_name}
    CRITICAL CONSTRAINT: Do NOT include ANY Gradio code, ANY UI code, or ANY launch blocks.
    Your output must be 100% PURE logic. If you include 'import gradio', the system will fail.
    Use real-world libraries where appropriate (e.g., requests for APIs). 
    Ensure the data is current and not hardcoded to old dates.
    The code must be raw logic only, industrial-grade, and well-commented.
  expected_output: >
    A JSON object with 'code' and 'description' fields. The 'code' must ONLY contain the class and logic.
  agent: backend_engineer
  context:
    - design_task

frontend_task:
  description: >
    Write a modern Gradio UI in app.py that demonstrates the backend.
    IMPORTANT: You MUST 'from {module_name} import {class_name}' and use it.
    Use ONLY modern Gradio 5+ syntax (no gr.inputs, no gr.outputs). 
    Use gr.Blocks for a professional, responsive layout.
    Do NOT rewrite the logic inside app.py.
  expected_output: >
    A JSON object with 'code' and 'description' fields. The 'code' must contain the Gradio app that imports and uses the backend.
  agent: frontend_engineer
  context:
    - code_task

test_task:
  description: >
    Write unit tests for the backend module {module_name}.
  expected_output: >
    A JSON object with 'code' and 'description' fields.
  agent: test_engineer
  context:
    - code_task

documentation_task:
  description: >
    Write a professional and EXTREMELY SIMPLE README.md for the project. 
    The goal is for a non-technical person to be able to run this immediately.
    It MUST include a prominent "🚀 QUICK START" section at the very top with:
    1. A single copy-pasteable block of commands to create venv, install requirements, and run the app.
    2. Absolute dummy-proof step-by-step logic.
    3. A brief explanation of why this code is high quality (separation of concerns, tests included).
  expected_output: >
    A user-friendly README.md file with prioritized Quick Start instructions.
  agent: documentation_engineer
  context:
    - code_task
    - frontend_task

requirements_task:
  description: >
    Create a requirements.txt file listing all external dependencies used in the project (e.g., gradio, requests).
  expected_output: >
    A JSON object with 'code' (string of the requirements.txt content) and 'description' fields.
  agent: backend_engineer
  context:
    - code_task
    - frontend_task