design_task:
  description: >
    Take the high level requirements and prepare a professional Engineering Blueprint.
    The goal is to provide a clean, high-level overview for a software architect.
    Your output should be a well-structured Markdown document with:
    1. System Overview: What the solution does.
    2. Component Roadmap: A high-level list of classes/components.
    3. Logic Flow: Briefly describe how the system handles the main requirement.
    Requirements: {requirements}
    Keep it clean, concise, and professional.
  expected_output: >
    A professional Engineering Blueprint in Markdown format.
  agent: engineering_lead
  output_file: output/{module_name}_design.md

code_task:
  description: >
    Write a python module that implements the design described by the engineering lead.
    Requirements: {requirements}
    IMPORTANT: You must output a JSON object with a 'code' field and a 'description' field.
    The 'code' field should contain ONLY the raw Python code.
    START the 'code' directly with the first line of code (import, class, etc.).
    NO markdown formatting, no backticks, no preamble inside the 'code' field.
  expected_output: >
    A JSON object with 'code' and 'description' fields. The 'code' must be raw Python.
  agent: backend_engineer
  context:
    - design_task

frontend_task:
  description: >
    Write a gradio UI in a module app.py that demonstrates the given backend class.
    Requirements: {requirements}
    IMPORTANT: You must output a JSON object with a 'code' field and a 'description' field.
    The 'code' field should contain ONLY the raw Python code.
    START the 'code' directly with the first line of code (import, etc.).
  expected_output: >
    A JSON object with 'code' and 'description' fields. The 'code' must be raw Python.
  agent: frontend_engineer
  context:
    - code_task

test_task:
  description: >
    Write unit tests for the given backend module {module_name}.
  expected_output: >
    A JSON object with 'code' and 'description' fields. The 'code' must be raw Python.
  agent: test_engineer
  context:
    - code_task

documentation_task:
  description: >
    Based on the finished Python module {module_name}, the Gradio app app.py, and the original requirements, write a professional README.md.
    Requirements were: {requirements}
    Sections: Title, Features, Structure, Setup, How to Use, Class Reference.
  expected_output: >
    A well-structured README.md file in markdown format.
  agent: documentation_engineer
  context:
    - code_task
    - frontend_task
  output_file: output/README.md