design_task:
  description: >
    Take the requirements and prepare an Engineering Blueprint in Markdown.
    The goal is to design the BACKEND LOGIC and class structure.
    IMPORTANT: Provide a structured report with headers. Do NOT write full Python code blocks here; only signatures.
    Requirements: {requirements}
  expected_output: >
    A clean, structured Markdown blueprint (no full code blocks).
  agent: engineering_lead

code_task:
  description: >
    Implement the designed logic in a pure Python module ({module_name}).
    Ensure the class {class_name} is fully functional and follows the blueprint.
    IMPORTANT: NO UI code, NO Gradio, and NO launch blocks allowed.
  expected_output: >
    A single Python file containing the robust business logic.
  agent: backend_engineer
  context:
    - design_task

frontend_task:
  description: >
    Write a modern Gradio UI in app.py that demonstrates the backend.
    IMPORTANT: You MUST 'from {module_name} import {class_name}' and use it.
    MODERN GRADIO 5+ RULES:
    1. Do NOT use 'readonly=True'. Use 'interactive=False' instead.
    2. Use ONLY gr.Blocks for the layout.
    3. Do NOT use deprecated gr.inputs or gr.outputs.
    4. Ensure the UI is professional and demonstrates all features of the backend.
  expected_output: >
    A JSON object with 'code' and 'description' fields. The 'code' must contain the Gradio app.
  agent: frontend_engineer
  context:
    - code_task

test_task:
  description: >
    Write a unit test suite for {module_name} that verifies all core functionalities.
    Mock external dependencies and test for both success and error cases.
  expected_output: >
    A runnable Python test file.
  agent: test_engineer
  context:
    - code_task

documentation_task:
  description: >
    Write a user-friendly README.md with a clear "🚀 QUICK START" section.
    The guide must describe how to run the software in simple steps.
  expected_output: >
    A professional README file in Markdown.
  agent: documentation_engineer
  context:
    - code_task
    - frontend_task

requirements_task:
  description: >
    Create a complete requirements.txt file for the project.
    Always include 'gradio>=5.0.0' and 'requests'.
  expected_output: >
    A requirements.txt file with all dependencies.
  agent: documentation_engineer
  context:
    - code_task
    - frontend_task